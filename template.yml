AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'backend

  Sample SAM Template for BikinAi.id backend

  '
Parameters:
  EnvironmentSuffix:
    Type: String
    Description: 'Suffix penanda environment (contoh: -sbx)'
    Default: -sbx
  ApiStageName:
    Type: String
    Description: API Gateway stage name untuk environment
    Default: sbx
  CognitoDomainPrefix:
    Type: String
    Description: Prefix domain Cognito bawaan Amazon (dipakai jika CognitoCustomDomainCertificateArn
      kosong)
    Default: bikinai-auth-sbx-9021
  CognitoCustomDomainHostname:
    Type: String
    Description: Hostname custom Hosted UI (contoh auth.example.com), tanpa https://.
      Dipakai hanya jika CognitoCustomDomainCertificateArn diisi.
    Default: ''
  CognitoCustomDomainCertificateArn:
    Type: String
    Description: 'ARN sertifikat ACM (ISSUED) untuk hostname custom Hosted UI. Untuk
      custom domain Cognito wajib di us-east-1 (N. Virginia) karena dipakai CloudFront;
      User Pool boleh di region lain (mis. ap-southeast-1). Kosongkan untuk memakai
      domain Cognito bawaan (CognitoDomainPrefix).

      '
    Default: ''
  ProvisionCognitoUserPoolDomain:
    Type: String
    Description: 'Set false SEKALI untuk menghapus resource domain dari pool (diperlukan
      saat migrasi domain Cognito bawaan ke custom domain, karena CloudFormation tidak
      bisa replace UserPoolDomain dalam satu deploy). Setelah deploy sukses, set true
      lalu deploy lagi.

      '
    Default: 'true'
    AllowedValues:
    - 'true'
    - 'false'
  FrontendCallbackUrl:
    Type: String
    Description: Frontend callback URL sesudah login Cognito
    Default: http://localhost:3000/dashboard
  FrontendLogoutUrl:
    Type: String
    Description: Frontend URL sesudah logout Cognito
    Default: http://localhost:3000/
  S3ResourceBucketName:
    Type: String
    Description: Nama bucket S3 untuk upload resource
    Default: dapurartisan-sbx
  GoogleClientId:
    Type: String
    Description: Google OAuth Client ID for Cognito
    Default: PLACEHOLDER_GOOGLE_CLIENT_ID
  GoogleClientSecret:
    Type: String
    Description: Google OAuth Client Secret for Cognito
    Default: PLACEHOLDER_GOOGLE_CLIENT_SECRET
  MidtransApiUrl:
    Type: String
    Description: Midtrans API URL
    Default: https://app.sandbox.midtrans.com/snap/v1/transactions
  MidtransFinishCallbackUrl:
    Type: String
    Description: Midtrans Snap finish callback URL
    Default: https://bkn-ai-dashboard.vercel.app/confirmation-payment
  UpstashRedisRestUrl:
    Type: String
    Description: Upstash Redis REST URL
    Default: PLACEHOLDER_UPSTASH_REDIS_REST_URL
  UpstashRedisRestToken:
    Type: String
    Description: Upstash Redis REST Token
    Default: PLACEHOLDER_UPSTASH_REDIS_REST_TOKEN
  GenerationBackend:
    Type: String
    Description: Backend generasi video/image (non FREE-TRIAL). "comfyui" = ComfyUI
      Cloud Lambda
    Default: redis
    AllowedValues:
    - redis
    - comfyui
  FreeTrialBackend:
    Type: String
    Description: Backend generasi video untuk FREE-TRIAL. "comfyui" = ComfyUI Cloud; "vertex_ai" = Vertex AI (Veo)
    Default: comfyui
    AllowedValues:
    - comfyui
    - vertex_ai
  ComfyMaxConcurrentJobs:
    Type: Number
    Description: Maksimum job paralel per API Key ComfyUI
    Default: 1
  UsePromptRefactor:
    Type: String
    Description: 'true = pipeline prompt 3-layer (UGC); false = prompt monolitik legacy'
    Default: 'false'
    AllowedValues:
    - 'true'
    - 'false'
  ConfigSsmPath:
    Type: String
    Description: SSM Parameter Store path prefix for app secrets (e.g. /visualkonten/prod)
    Default: /visualkonten/sbx
  GcsBucket:
    Type: String
    Description: Bucket GCS untuk output FREE-TRIAL Vertex AI
    Default: result-visualkonten
  VeoVideoDurationSeconds:
    Type: Number
    Description: Durasi video Veo (detik) untuk FREE-TRIAL / Vertex AI
    Default: 8
    MinValue: 1
    MaxValue: 60
Rules:
  CognitoCustomDomainNeedsHostname:
    RuleCondition:
      Fn::Not:
      - Fn::Equals:
        - Ref: CognitoCustomDomainCertificateArn
        - ''
    Assertions:
    - Assert:
        Fn::Not:
        - Fn::Equals:
          - Ref: CognitoCustomDomainHostname
          - ''
      AssertDescription: Isi CognitoCustomDomainHostname (FQDN tanpa https) bila CognitoCustomDomainCertificateArn
        diisi.
Globals:
  Function:
    Timeout: 10
    MemorySize: 128
Conditions:
  UseCognitoCustomDomain:
    Fn::Not:
    - Fn::Equals:
      - Ref: CognitoCustomDomainCertificateArn
      - ''
  CreateUserPoolDomain:
    Fn::Equals:
    - Ref: ProvisionCognitoUserPoolDomain
    - 'true'
  IsDevEnvironment:
    Fn::Not:
    - Fn::Equals:
      - Ref: EnvironmentSuffix
      - -prod
Resources:
  ProfileTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: profile${EnvironmentSuffix}
      AttributeDefinitions:
      - AttributeName: user_id
        AttributeType: S
      - AttributeName: user_type
        AttributeType: S
      KeySchema:
      - AttributeName: user_id
        KeyType: HASH
      - AttributeName: user_type
        KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  TopupCreditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: topup_credit${EnvironmentSuffix}
      AttributeDefinitions:
      - AttributeName: uuid
        AttributeType: S
      - AttributeName: user_email
        AttributeType: S
      - AttributeName: created_at
        AttributeType: S
      KeySchema:
      - AttributeName: uuid
        KeyType: HASH
      - AttributeName: user_email
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: UserEmailIndex
        KeySchema:
        - AttributeName: user_email
          KeyType: HASH
        - AttributeName: created_at
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
  UserRequestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: user_request${EnvironmentSuffix}
      AttributeDefinitions:
      - AttributeName: uuid
        AttributeType: S
      - AttributeName: user_email
        AttributeType: S
      - AttributeName: created_at
        AttributeType: S
      - AttributeName: status
        AttributeType: S
      - AttributeName: image_prompt_id
        AttributeType: S
      - AttributeName: comfy_prompt_id
        AttributeType: S
      KeySchema:
      - AttributeName: uuid
        KeyType: HASH
      - AttributeName: user_email
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: UserEmailCreatedIndex
        KeySchema:
        - AttributeName: user_email
          KeyType: HASH
        - AttributeName: created_at
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: StatusCreatedIndex
        KeySchema:
        - AttributeName: status
          KeyType: HASH
        - AttributeName: created_at
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: ImagePromptIdIndex
        KeySchema:
        - AttributeName: image_prompt_id
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      - IndexName: ComfyPromptIdIndex
        KeySchema:
        - AttributeName: comfy_prompt_id
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
  PricingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: pricing${EnvironmentSuffix}
      AttributeDefinitions:
      - AttributeName: key
        AttributeType: S
      - AttributeName: charge
        AttributeType: S
      KeySchema:
      - AttributeName: key
        KeyType: HASH
      - AttributeName: charge
        KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  TransactionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: transaction${EnvironmentSuffix}
      AttributeDefinitions:
      - AttributeName: transaction_id
        AttributeType: S
      - AttributeName: transaction_status
        AttributeType: S
      KeySchema:
      - AttributeName: transaction_id
        KeyType: HASH
      - AttributeName: transaction_status
        KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: BikinAiUserPool${EnvironmentSuffix}
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Schema:
      - Name: term_and_condition
        AttributeDataType: String
        Mutable: true
        Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
      LambdaConfig:
        PostConfirmation:
          Fn::GetAtt:
          - CognitoPostAuthTriggerFunction
          - Arn
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: CreateUserPoolDomain
    Properties:
      Domain:
        Fn::If:
        - UseCognitoCustomDomain
        - Ref: CognitoCustomDomainHostname
        - Ref: CognitoDomainPrefix
      UserPoolId:
        Ref: UserPool
      CustomDomainConfig:
        Fn::If:
        - UseCognitoCustomDomain
        - CertificateArn:
            Ref: CognitoCustomDomainCertificateArn
        - Ref: AWS::NoValue
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      ProviderName: Google
      ProviderType: Google
      UserPoolId:
        Ref: UserPool
      ProviderDetails:
        client_id:
          Ref: GoogleClientId
        client_secret:
          Ref: GoogleClientSecret
        authorize_scopes: profile email openid
      AttributeMapping:
        email: email
        username: sub
        name: name
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName:
        Fn::Sub: BikinAiWebClient${EnvironmentSuffix}
      UserPoolId:
        Ref: UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
      - COGNITO
      - Google
      AllowedOAuthFlows:
      - code
      AllowedOAuthScopes:
      - email
      - openid
      - profile
      - aws.cognito.signin.user.admin
      ReadAttributes:
      - email
      - name
      - phone_number
      - custom:term_and_condition
      WriteAttributes:
      - email
      - name
      - phone_number
      - custom:term_and_condition
      CallbackURLs:
      - Ref: FrontendCallbackUrl
      LogoutURLs:
      - Ref: FrontendLogoutUrl
    DependsOn: GoogleIdentityProvider
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName:
        Ref: ApiStageName
      Cors:
        AllowMethods: '''GET,POST,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin: '''*'''
        AllowCredentials: false
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn:
              Fn::GetAtt:
              - UserPool
              - Arn
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.handler
      Runtime: nodejs22.x
      Timeout: 30
      MemorySize: 512
      Architectures:
      - x86_64
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ProfileTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TopupCreditTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UserRequestTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PricingTable
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - s3:PutObject
          - s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${S3ResourceBucketName}/*
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - lambda:InvokeFunction
          Resource:
          - Fn::GetAtt:
            - ComfyUIWorkerFunction
            - Arn
          - Fn::GetAtt:
            - FreeTrialWorkerFunction
            - Arn
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - ssm:GetParameter
          - ssm:GetParameters
          - ssm:GetParametersByPath
          Resource:
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}/*
      Environment:
        Variables:
          CONFIG_SSM_PATH:
            Ref: ConfigSsmPath
          PROFILE_TABLE_NAME:
            Ref: ProfileTable
          TOPUP_CREDIT_TABLE_NAME:
            Ref: TopupCreditTable
          TOPUP_CREDIT_USER_EMAIL_INDEX: UserEmailIndex
          USER_REQUEST_TABLE_NAME:
            Ref: UserRequestTable
          USER_REQUEST_USER_EMAIL_INDEX: UserEmailCreatedIndex
          PRICING_TABLE_NAME:
            Ref: PricingTable
          S3_RESOURCE_BUCKET:
            Ref: S3ResourceBucketName
          MIDTRANS_API_URL:
            Ref: MidtransApiUrl
          MIDTRANS_FINISH_CALLBACK_URL:
            Ref: MidtransFinishCallbackUrl
          GENERATION_BACKEND:
            Ref: GenerationBackend
          COMFYUI_FUNCTION_NAME:
            Ref: ComfyUIWorkerFunction
          FREE_TRIAL_FUNCTION_NAME:
            Ref: FreeTrialWorkerFunction
      Events:
        GetUser:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /user
            Method: get
        GetCredit:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /credit
            Method: get
        GetUsage:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /usage
            Method: get
        BatchStatusGet:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /jobs/status
            Method: get
        BatchStatusPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /jobs/status
            Method: post
        GetPricing:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /pricing/{key}
            Method: get
        GetTopupDetail:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /topup/{orderId}
            Method: get
        CreateSnap:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /snap
            Method: post
        PostResource:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /resource
            Method: post
        GetPresigned:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /presigned
            Method: get
        HelloWorld:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /hello
            Method: get
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: HelloWorldFunction
  CognitoPostAuthTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: postAuth.handler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ProfileTable
      Environment:
        Variables:
          PROFILE_TABLE_NAME:
            Ref: ProfileTable
    Metadata:
      SamResourceId: CognitoPostAuthTriggerFunction
  MidtransWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: midtransWebhook.handler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TransactionTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TopupCreditTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ProfileTable
      Environment:
        Variables:
          TRANSACTION_TABLE_NAME:
            Ref: TransactionTable
          TOPUP_CREDIT_TABLE_NAME:
            Ref: TopupCreditTable
          PROFILE_TABLE_NAME:
            Ref: ProfileTable
      Events:
        MidtransWebhook:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /midtrans/webhook
            Method: post
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: MidtransWebhookFunction
  LambdaGcpBucketWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: lambdaGcpBucketWebhook.handler
      Runtime: nodejs22.x
      Timeout: 300
      MemorySize: 512
      Architectures:
      - x86_64
      Policies:
      - AWSLambdaBasicExecutionRole
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - s3:PutObject
          - s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${S3ResourceBucketName}/*
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - ssm:GetParameter
          - ssm:GetParameters
          - ssm:GetParametersByPath
          Resource:
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}/*
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UserRequestTable
      Environment:
        Variables:
          S3_RESOURCE_BUCKET:
            Ref: S3ResourceBucketName
          USER_REQUEST_TABLE_NAME:
            Ref: UserRequestTable
          CONFIG_SSM_PATH:
            Ref: ConfigSsmPath
          # DEP0040: transitive deps (google-auth) still require('punycode') on Node 22
          NODE_OPTIONS: --disable-warning=DEP0040
      Events:
        LambdaGcpBucketWebhook:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /gcp/bucket-webhook
            Method: post
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: LambdaGcpBucketWebhookFunction
  FreeTrialWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: freeTrialWorker.handler
      Runtime: nodejs22.x
      Timeout: 300
      MemorySize: 512
      Architectures:
      - x86_64
      Policies:
      - AWSLambdaBasicExecutionRole
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UserRequestTable
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - s3:GetObject
          - s3:PutObject
          Resource:
            Fn::Sub: arn:aws:s3:::${S3ResourceBucketName}/*
        - Effect: Allow
          Action:
          - ssm:GetParameter
          - ssm:GetParameters
          - ssm:GetParametersByPath
          Resource:
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}/*
      Environment:
        Variables:
          CONFIG_SSM_PATH:
            Ref: ConfigSsmPath
          USER_REQUEST_TABLE_NAME:
            Ref: UserRequestTable
          S3_RESOURCE_BUCKET:
            Ref: S3ResourceBucketName
          GCS_BUCKET:
            Ref: GcsBucket
          VEO_VIDEO_DURATION_SECONDS:
            Ref: VeoVideoDurationSeconds
          FREE_TRIAL_BACKEND:
            Ref: FreeTrialBackend
          UPSTASH_REDIS_REST_URL:
            Ref: UpstashRedisRestUrl
          UPSTASH_REDIS_REST_TOKEN:
            Ref: UpstashRedisRestToken
    Metadata:
      SamResourceId: FreeTrialWorkerFunction
  ComfyUIWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: comfyuiWorker.handler
      Runtime: nodejs22.x
      Timeout: 600
      MemorySize: 256
      Architectures:
      - x86_64
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UserRequestTable
      - AWSLambdaBasicExecutionRole
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - s3:PutObject
          - s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${S3ResourceBucketName}/*
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - ssm:GetParameter
          - ssm:GetParameters
          - ssm:GetParametersByPath
          Resource:
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}
          - Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}/*
      Environment:
        Variables:
          CONFIG_SSM_PATH:
            Ref: ConfigSsmPath
          USER_REQUEST_TABLE_NAME:
            Ref: UserRequestTable
          STATUS_CREATED_INDEX_NAME: StatusCreatedIndex
          S3_RESOURCE_BUCKET:
            Ref: S3ResourceBucketName
          UPSTASH_REDIS_REST_URL:
            Ref: UpstashRedisRestUrl
          UPSTASH_REDIS_REST_TOKEN:
            Ref: UpstashRedisRestToken
          COMFY_MAX_CONCURRENT_JOBS:
            Ref: ComfyMaxConcurrentJobs
          USE_PROMPT_REFACTOR:
            Ref: UsePromptRefactor
      Events:
        ComfyUIPollSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Poll ComfyUI Cloud status for processing jobs
            Enabled: true
    Metadata:
      SamResourceId: ComfyUIWorkerFunction
  CognitoInvokePermissionForPostAuth:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: CognitoPostAuthTriggerFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn:
        Fn::GetAtt:
        - UserPool
        - Arn
  ComfyUIWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/comfyuiWebhook.handler
      Runtime: nodejs22.x
      Timeout: 30
      MemorySize: 512 # Increase memory for image processing/download
      Policies:
      - DynamoDBCrudPolicy:
          TableName: !Ref UserRequestTable
      - S3CrudPolicy:
          BucketName: !Ref S3ResourceBucketName
      Environment:
        Variables:
          USER_REQUEST_TABLE_NAME: !Ref UserRequestTable
          S3_RESOURCE_BUCKET: !Ref S3ResourceBucketName
          IMAGE_PROMPT_ID_INDEX: ImagePromptIdIndex
          VIDEO_PROMPT_ID_INDEX: ComfyPromptIdIndex
          UPSTASH_REDIS_REST_URL: !Ref UpstashRedisRestUrl
          UPSTASH_REDIS_REST_TOKEN: !Ref UpstashRedisRestToken
      Events:
        ComfyUIWebhookEvent:
          Type: Api
          Properties:
            Path: /comfyui-webhook
            Method: post
            RestApiId: !Ref Api
            Auth:
              Authorizer: NONE # Webhook usually doesn't have Cognito auth
  RecoveryCronFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: recoveryCron.handler
      Runtime: nodejs22.x
      Timeout: 900 # 15 minutes timeout to allow downloads
      MemorySize: 512
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserRequestTable
        - S3CrudPolicy:
            BucketName: !Ref S3ResourceBucketName
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ConfigSsmPath}/*'
      Environment:
        Variables:
          USER_REQUEST_TABLE_NAME: !Ref UserRequestTable
          S3_RESOURCE_BUCKET: !Ref S3ResourceBucketName
          IMAGE_PROMPT_ID_INDEX: ImagePromptIdIndex
          VIDEO_PROMPT_ID_INDEX: ComfyPromptIdIndex
          CONFIG_SSM_PATH: !Ref ConfigSsmPath
      Events:
        HourlyCronEvent:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Description: Recover stalled jobs that are older than 1 hour
            Enabled: true
    Metadata:
      SamResourceId: RecoveryCronFunction

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for active stage
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}
  UserPoolId:
    Description: Cognito User Pool ID
    Value:
      Ref: UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value:
      Ref: UserPoolClient
  MidtransWebhookUrl:
    Description: Public webhook URL for Midtrans notifications
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/midtrans/webhook
  UserPoolDomainUrl:
    Description: Hosted UI base URL (custom, Cognito bawaan, atau placeholder jika
      domain tidak di-provision)
    Value:
      Fn::If:
      - CreateUserPoolDomain
      - Fn::If:
        - UseCognitoCustomDomain
        - Fn::Sub: https://${CognitoCustomDomainHostname}
        - Fn::Sub: https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
      - "(UserPoolDomain tidak aktif \u2014 set ProvisionCognitoUserPoolDomain=true\
        \ lalu deploy)"
  WorkerAUrl:
    Description: Base URL for Worker A (Main API /resource endpoint)
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}
  ComfyUIWorkerArn:
    Description: ARN for the ComfyUI Worker Lambda
    Value:
      Fn::GetAtt:
      - ComfyUIWorkerFunction
      - Arn
  ComfyUIWebhookUrl:
    Description: Webhook URL for ComfyUI Cloud results
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/comfyui-webhook
  LambdaGcpBucketWebhookUrl:
    Description: Webhook URL for GCP Pub/Sub fileCreated push
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/gcp/bucket-webhook

